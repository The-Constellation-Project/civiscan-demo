<!DOCTYPE html>
<html>

<head>
    <title>Civiscan Map</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="map.css">
    <script src="map.js" defer></script>
</head>

<body>
    <header>
        <h1><a href='index.html'>Civiscan</a></h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="map.html">Map</a>
            <a href="review.html">Review</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>

    </header>
    <div class="map-layout">
        <div class="sidebar">
            <h2>Section DEMO-1</h2>
            <p>Flags placed:</p>
            <p id="flag-count">0</p>
            <br><br><br><br>
            <p class="pan-hint">Hold <kbd>Space</kbd> + drag to pan</p>
            <button>Submit Section</button>
        </div>
        <div id="map"></div>
    </div>

    <div style="
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 9999;
      max-width: 300px;
      background: #2a1a1a;
      border: 1px solid #7a2e2e;
      border-left: 3px solid #c0392b;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-family: sans-serif;">
      
        <p style="
        margin: 0 0 0.25rem 0;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c0392b;">
      Demo Notice
      </p>
        
      <p style="
        margin: 0;
        font-size: 0.75rem;
        color: #b0a0a0;
        line-height: 1.5;">
      This is a static demo site. No real data used, and website may undergo changes as feedback is received.
      </p>
    </div>

</body>


</html>
