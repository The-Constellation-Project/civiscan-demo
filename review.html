<!DOCTYPE html>
<html>

<head>
    <title>Civiscan Review</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="review.css">
    <script src="review.js" defer></script>
</head>

<body>

    <header>
        <h1><a href='index.html'>Civican</a></h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="map.html">Map</a>
            <a href="review.html">Review</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>

    </header>

    <div class="review-page">

        <div class="review-map-panel">
            <div id="review-map">
                <div id="review-map-canvas">
                    <img id="review-map-image" src="examplemap.webp" alt="Section DEMO-1 map">
                </div>
            </div>
        </div>

        <div class="review-table-panel">
            <div class="review-header">
                <h2>Aggregated Flags</h2>
                <span class="review-subtitle">Section DEMO-1</span>
            </div>

            <div class="table-wrapper">
                <table class="flag-table">
                    <thead>
                        <tr>
                            <th>Latitude</th>
                            <th>Longitude</th>
                            <th>Agreement</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- dummy data -->
                        <tr data-flag="1" data-lat="0.38" data-lng="0.42">
                            <td class="coord">40.712</td>
                            <td class="coord">-74.001</td>
                            <td><span class="agreement high">3 users</span></td>
                            <td class="actions">
                                <button class="action-btn approve">Approve</button>
                                <button class="action-btn reject">Reject</button>
                            </td>
                        </tr>
                        <tr data-flag="2" data-lat="0.55" data-lng="0.61">
                            <td class="coord">40.713</td>
                            <td class="coord">-74.002</td>
                            <td><span class="agreement mid">2 users</span></td>
                            <td class="actions">
                                <button class="action-btn approve">Approve</button>
                                <button class="action-btn reject">Reject</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div style="
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 9999;
      max-width: 300px;
      background: #2a1a1a;
      border: 1px solid #7a2e2e;
      border-left: 3px solid #c0392b;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-family: sans-serif;">
      
        <p style="
        margin: 0 0 0.25rem 0;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c0392b;">
      Demo Notice
      </p>
        
      <p style="
        margin: 0;
        font-size: 0.75rem;
        color: #b0a0a0;
        line-height: 1.5;">
      This is a static demo site. No real data used, and website may undergo changes as feedback is received.
      </p>
    </div>

</body>


</html>
